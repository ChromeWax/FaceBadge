<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge3D Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #ccc;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
}
.image-container {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
  background: #000;
  cursor: grab;
  touch-action: none;
}
.image-container:active {
  cursor: grabbing;
}
.image-container img {
  display: block;
  width: min(480px, 90vw);
  height: auto;
  pointer-events: none;
  -webkit-user-drag: none;
}
</style>
</head>
<body>
<div class="image-container">
  <img id="render" src="../images/compressed_renders/pitch_+00_yaw_+00.jpg" alt="3D Render">
</div>
<script>
(() => {
  const container = document.querySelector('.image-container');
  const img = document.getElementById('render');

  let isDragging = false;
  let isAnimating = false;
  let animFrameId = null;
  let currentYaw = 0;
  let currentPitch = 0;
  let startPointerX = 0;
  let startPointerY = 0;

  const YAW_MAX = 20;
  const PITCH_MAX = 10;
  const ANIM_DURATION = 400;

  function fmt(n) {
    return (n >= 0 ? '+' : '-') + String(Math.abs(n)).padStart(2, '0');
  }

  function setRender(yaw, pitch) {
    const sy = Math.round(yaw / 2) * 2;
    const sp = Math.round(pitch / 2) * 2;
    const cy = Math.max(-YAW_MAX, Math.min(YAW_MAX, sy));
    const cp = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, sp));
    img.src = `../images/compressed_renders/pitch_${fmt(cp)}_yaw_${fmt(cy)}.jpg`;
  }

  function animateBack() {
    if (currentYaw === 0 && currentPitch === 0) return;
    isAnimating = true;
    const startYaw = currentYaw;
    const startPitch = currentPitch;
    const startTime = performance.now();

    function tick(now) {
      const t = Math.min((now - startTime) / ANIM_DURATION, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      currentYaw = startYaw * (1 - ease);
      currentPitch = startPitch * (1 - ease);
      setRender(currentYaw, currentPitch);
      if (t < 1) {
        animFrameId = requestAnimationFrame(tick);
      } else {
        currentYaw = 0;
        currentPitch = 0;
        setRender(0, 0);
        isAnimating = false;
        animFrameId = null;
      }
    }
    animFrameId = requestAnimationFrame(tick);
  }

  container.addEventListener('pointerdown', (e) => {
    isDragging = true;
    container.setPointerCapture(e.pointerId);
    startPointerX = e.clientX;
    startPointerY = e.clientY;
    container.style.cursor = 'grabbing';
    if (isAnimating) {
      cancelAnimationFrame(animFrameId);
      isAnimating = false;
      animFrameId = null;
    }
  });

  container.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    const rect = container.getBoundingClientRect();
    if (rect.width === 0) return;
    const dx = e.clientX - startPointerX;
    const dy = e.clientY - startPointerY;
    currentYaw = (dx / rect.width) * YAW_MAX;
    currentPitch = (dy / rect.height) * PITCH_MAX;
    currentYaw = Math.max(-YAW_MAX, Math.min(YAW_MAX, currentYaw));
    currentPitch = Math.max(-PITCH_MAX, Math.min(PITCH_MAX, currentPitch));
    setRender(currentYaw, currentPitch);
  });

  container.addEventListener('pointerup', () => {
    if (!isDragging) return;
    isDragging = false;
    container.style.cursor = 'grab';
    animateBack();
  });

  container.addEventListener('pointercancel', () => {
    if (!isDragging) return;
    isDragging = false;
    container.style.cursor = 'grab';
    animateBack();
  });
})();
</script>
</body>
</html>
